<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trzepot</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#0d1b2a; font-family:'Trebuchet MS',system-ui,sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; touch-action:none; }
  #hud {
    position:fixed; top:0; left:0; right:0; padding:env(safe-area-inset-top,12px) 0 0;
    text-align:center; pointer-events:none; z-index:5;
  }
  #score { font-size:64px; font-weight:800; color:#fff; text-shadow:0 4px 0 rgba(0,0,0,.35); letter-spacing:-2px; margin-top:14px; }
  #levelTag { font-size:15px; font-weight:700; color:rgba(255,255,255,.75); letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
  #overlay {
    position:fixed; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; text-align:center;
    background:rgba(13,27,42,.55); backdrop-filter:blur(2px); padding:24px;
  }
  #overlay.hide { display:none; }
  h1 { color:#ffd60a; font-size:44px; font-weight:800; letter-spacing:1px; text-shadow:0 4px 0 rgba(0,0,0,.35); }
  .sub { color:#e0e1dd; font-size:17px; max-width:290px; line-height:1.4; }
  .big { color:#fff; font-size:22px; }
  .best { color:#a9d6e5; font-size:16px; min-height:18px; }
  .diffs { display:flex; flex-direction:column; gap:10px; width:230px; pointer-events:auto; }
  .diff {
    border:none; border-radius:14px; padding:13px 18px; font-size:18px; font-weight:800;
    letter-spacing:.5px; cursor:pointer; color:#fff; text-align:left;
    display:flex; justify-content:space-between; align-items:center;
    box-shadow:0 4px 0 rgba(0,0,0,.3); transition:transform .05s;
  }
  .diff:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.3); }
  .diff.sel { outline:3px solid #fff; }
  .diff .r { font-size:13px; font-weight:700; opacity:.85; }
  .d0 { background:#4cae4c; }
  .d1 { background:#2a9d8f; }
  .d2 { background:#e08e0b; }
  .d3 { background:#c1121f; }
  button.play {
    pointer-events:auto; margin-top:4px; border:none; border-radius:16px;
    background:#ffd60a; color:#0d1b2a; font-size:22px; font-weight:800;
    padding:15px 46px; box-shadow:0 6px 0 #d4a900; cursor:pointer; letter-spacing:.5px;
  }
  button.play:active { transform:translateY(4px); box-shadow:0 2px 0 #d4a900; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud"><div id="score"></div><div id="levelTag"></div></div>

<div id="overlay">
  <h1>TRZEPOT</h1>
  <div class="sub" id="subText">Dotknij ekranu, żeby lecieć. Omijaj rury. Im dłużej grasz, tym trudniej.</div>
  <div class="diffs" id="diffs"></div>
  <div class="best" id="bestStart"></div>
  <button class="play" id="startBtn">GRAJ</button>
</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const scoreEl = document.getElementById('score');
const levelTag = document.getElementById('levelTag');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const bestStart = document.getElementById('bestStart');
const subText = document.getElementById('subText');
const diffsEl = document.getElementById('diffs');

// ---- POZIOMY TRUDNOSCI ----
// Kazdy poziom: startowe warunki + jak szybko sie zaostrza (ramp) + sufit (min gap / max speed).
// gap w jednostkach *scale, mierzone od "bazowej" szczeliny.
const LEVELS = [
  { name:'Łatwy',    cls:'d0',
    gap0:200, gapMin:150, speed0:2.3, speedMax:4.2,
    rampEvery:6, gapStep:5, speedStep:0.10, moving:false, movAmp:0, spacing:230 },
  { name:'Normalny', cls:'d1',
    gap0:175, gapMin:128, speed0:2.7, speedMax:5.0,
    rampEvery:5, gapStep:6, speedStep:0.13, moving:false, movAmp:0, spacing:210 },
  { name:'Trudny',   cls:'d2',
    gap0:158, gapMin:112, speed0:3.1, speedMax:5.8,
    rampEvery:4, gapStep:7, speedStep:0.16, moving:true, movAmp:26, spacing:195 },
  { name:'Hardcore', cls:'d3',
    gap0:142, gapMin:98, speed0:3.5, speedMax:6.6,
    rampEvery:3, gapStep:8, speedStep:0.19, moving:true, movAmp:46, spacing:180 },
];
let levelIdx = +(localStorage.getItem('trzepot_lvl') || 0);
if(levelIdx<0||levelIdx>3) levelIdx=0;

function bestKey(i){ return 'trzepot_best_'+i; }
function getBest(i){ return +(localStorage.getItem(bestKey(i))||0); }

function buildMenu(){
  diffsEl.innerHTML='';
  LEVELS.forEach((L,i)=>{
    const b=document.createElement('button');
    b.className='diff '+L.cls+(i===levelIdx?' sel':'');
    b.innerHTML='<span>'+L.name+'</span><span class="r">rekord '+getBest(i)+'</span>';
    b.onclick=()=>{ levelIdx=i; localStorage.setItem('trzepot_lvl',i); buildMenu(); };
    diffsEl.appendChild(b);
  });
}
buildMenu();

let W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 3);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

let state = 'menu'; // menu | play | dead
let bird, pipes, score, frame, gap, speed, L, ground;

function scale(){ return H/640; }

function reset(){
  const s = scale();
  L = LEVELS[levelIdx];
  bird = { x: W*0.28, y: H*0.45, r: 14*s, vy:0 };
  pipes = [];
  score = 0; frame = 0;
  gap = L.gap0*s;
  speed = L.speed0*s;
  scoreEl.textContent = '';
}

function applyRamp(){
  // wywolywane co zdobyty punkt
  const s = scale();
  if(score % L.rampEvery === 0){
    gap = Math.max(L.gapMin*s, gap - L.gapStep*s);
    speed = Math.min(L.speedMax*s, speed + L.speedStep*s);
  }
}

function spawnPipe(){
  const s = scale();
  const margin = 55*s;
  const range = H - gap - margin*2 - ground;
  const top = margin + Math.random()*Math.max(40*s, range);
  pipes.push({
    x: W+40, top: top, w: 62*s, scored:false,
    phase: Math.random()*Math.PI*2, base: top
  });
}

function flap(){ if(state==='play') bird.vy = -6.2*scale(); }

function start(){
  reset();
  state='play';
  overlay.classList.add('hide');
  scoreEl.textContent = '0';
  levelTag.textContent = L.name;
}

function die(){
  state='dead';
  const b=getBest(levelIdx);
  if(score>b) localStorage.setItem(bestKey(levelIdx), score);
  buildMenu();
  overlay.querySelector('h1').textContent = 'KONIEC';
  subText.innerHTML = '<span class="big">Wynik: '+score+'</span><br>Poziom: '+L.name;
  bestStart.textContent = 'Rekord ('+L.name+'): '+getBest(levelIdx);
  startBtn.textContent = 'JESZCZE RAZ';
  levelTag.textContent = '';
  overlay.classList.remove('hide');
}

function press(e){ e.preventDefault(); if(state==='play') flap(); }
cv.addEventListener('touchstart', press, {passive:false});
cv.addEventListener('mousedown', press);
window.addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); flap(); }});
startBtn.addEventListener('click', start);

function update(){
  const s = scale();
  ground = 70*s;
  if(state==='play'){
    frame++;
    bird.vy += 0.36*s;
    bird.y += bird.vy;

    if(pipes.length===0 || pipes[pipes.length-1].x < W - L.spacing*s) spawnPipe();

    for(const p of pipes){
      p.x -= speed;
      // ruchome rury na trudniejszych poziomach
      if(L.moving){
        p.top = p.base + Math.sin(frame*0.03 + p.phase) * L.movAmp*s;
        p.top = Math.max(45*s, Math.min(H-ground-gap-45*s, p.top));
      }
      if(!p.scored && p.x + p.w < bird.x){
        p.scored=true; score++; scoreEl.textContent=score; applyRamp();
      }
    }
    pipes = pipes.filter(p=> p.x + p.w > -10);

    if(bird.y + bird.r > H - ground || bird.y - bird.r < 0){ bird.y=Math.max(bird.r,bird.y); die(); }
    for(const p of pipes){
      if(bird.x + bird.r > p.x && bird.x - bird.r < p.x + p.w){
        if(bird.y - bird.r < p.top || bird.y + bird.r > p.top + gap){ die(); }
      }
    }
  }
}

function draw(){
  const s = scale();
  ground = 70*s;
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1b98e0'); g.addColorStop(1,'#a9d6e5');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(255,255,255,.35)';
  const t = (frame*0.4)% (W+200);
  for(let i=0;i<3;i++){
    const cx = (W - t + i*260)% (W+200) -100;
    const cy = 90*s + i*70*s;
    cloud(cx,cy,34*s);
  }

  for(const p of pipes){
    drawPipe(p.x, 0, p.w, p.top, true);
    drawPipe(p.x, p.top+gap, p.w, H-ground-(p.top+gap), false);
  }

  ctx.fillStyle='#c9a227'; ctx.fillRect(0,H-ground,W,ground);
  ctx.fillStyle='#8cbf3f'; ctx.fillRect(0,H-ground,W,10*s);

  drawBird();
}

function cloud(x,y,r){
  ctx.beginPath();
  ctx.arc(x,y,r,0,7); ctx.arc(x+r,y+6,r*0.8,0,7); ctx.arc(x-r,y+6,r*0.8,0,7);
  ctx.fill();
}

function drawPipe(x,y,w,h,top){
  const s=scale();
  ctx.fillStyle='#2a9d3a'; ctx.fillRect(x,y,w,h);
  ctx.fillStyle='#238a30'; ctx.fillRect(x+w-8*s,y,8*s,h);
  ctx.fillStyle='#3ab54a'; ctx.fillRect(x,y,7*s,h);
  ctx.fillStyle='#2a9d3a';
  const lipH=18*s, lipX=x-5*s, lipW=w+10*s;
  ctx.fillRect(lipX, top? y+h-lipH : y, lipW, lipH);
  ctx.fillStyle='#238a30';
  ctx.fillRect(lipX, top? y+h-lipH : y+lipH-4*s, lipW, 4*s);
}

function drawBird(){
  const s=scale();
  ctx.save();
  ctx.translate(bird.x,bird.y);
  const ang = Math.max(-0.5, Math.min(1.2, bird.vy*0.06));
  ctx.rotate(state==='menu'?0:ang);
  ctx.fillStyle='#ffd60a';
  ctx.beginPath(); ctx.arc(0,0,bird.r,0,7); ctx.fill();
  ctx.fillStyle='#f4a300';
  const wf = Math.sin(frame*0.3)*4*s;
  ctx.beginPath(); ctx.ellipse(-3*s, 2*s+wf, bird.r*0.6, bird.r*0.4, 0,0,7); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(bird.r*0.4,-bird.r*0.35,bird.r*0.35,0,7); ctx.fill();
  ctx.fillStyle='#0d1b2a'; ctx.beginPath(); ctx.arc(bird.r*0.5,-bird.r*0.35,bird.r*0.16,0,7); ctx.fill();
  ctx.fillStyle='#e85d04';
  ctx.beginPath(); ctx.moveTo(bird.r*0.7,0); ctx.lineTo(bird.r*1.3,-2*s); ctx.lineTo(bird.r*1.3,4*s); ctx.fill();
  ctx.restore();
}

function loop(){
  if(state==='menu'){
    frame++;
    if(!bird) bird={x:W*0.28,y:H*0.45,r:14*scale(),vy:0};
    bird.y = H*0.45 + Math.sin(frame*0.06)*8;
    ground = 70*scale();
  }
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
